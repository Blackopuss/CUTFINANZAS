server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: categories-service
          uri: lb://CATEGORIES-SERVICE
          predicates:
          - Path=/api/categories/**
        - id: card-service
          uri: lb://CARD-SERVICE
          predicates:
          - Path=/api/cards/**
        - id: transactions-service
          uri: lb://TRANSACTIONS-SERVICE
          predicates:
          - Path=/api/transactions/**
        - id: goals-service
          uri: lb://GOALS-SERVICE
          predicates:
          - Path=/api/goals/**
        - id: userservice-users
          uri: lb://USERSERVICE
          predicates:
          - Path=/api/users/**
        - id: userservice-auth
          uri: lb://USERSERVICE
          predicates:
          - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
