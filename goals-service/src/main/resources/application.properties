spring.application.name=goals-service
server.port=${SERVER_PORT:8085}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/goals_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eduardo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0206}
